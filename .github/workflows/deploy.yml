name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, mysql, pdo, pdo_mysql, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Pull latest code on server
        uses: appleboy/ssh-action@v1
        with:
          host: 151.106.116.52
          username: u700921586
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          timeout: 30s
          script: |
            set -e
            cd domains/moccasin-dogfish-924842.hostingersite.com/chomin
            git checkout -- public/build || true
            rm -rf public/build/assets
            git pull origin main

      - name: Upload built assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 151.106.116.52
          username: u700921586
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          source: public/build
          target: domains/moccasin-dogfish-924842.hostingersite.com/chomin
          overwrite: true

      - name: Run migrations and cache config
        uses: appleboy/ssh-action@v1
        with:
          host: 151.106.116.52
          username: u700921586
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          timeout: 30s
          script: |
            set -e
            cd domains/moccasin-dogfish-924842.hostingersite.com/chomin
            composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
            php artisan migrate --force
            php artisan storage:link
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            curl -fsS https://moccasin-dogfish-924842.hostingersite.com/th >/dev/null
            echo "Deploy complete: $(date)"
